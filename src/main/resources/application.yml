spring:
  application:
    name: auth
  #dataSource
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;MODE=MySQL
    username: sa
  #JPA
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false

  #  OAuth2 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - profile
              - email
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google"
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-kakao-rest-api-key}
            client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/kakao"
            client-name: Kakao

          naver:
            client-id: ${NAVER_CLIENT_ID:your-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:your-naver-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/naver"
            client-name: Naver

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  # Gmail SMTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@example.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

#logging
logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql: trace
      springframework:
        web:
          client:
            RestTemplate: DEBUG

token:
  jwt:
    # RSA 키는 환경 변수로 관리 (.env 파일 또는 서버 환경 변수)
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    header: Authorization
    prefix: Bearer
    access:
      expire-min: 30
    refresh:
      expire-min: 20160 #14일

springdoc:
  swagger-ui:
    use-root-path: true

app:
  frontend-callback-url: ${FRONTEND_CALLBACK_URL:http://localhost:3000/auth/callback}
  mail:
    from: ${MAIL_USERNAME:noreply@example.com}
  password-reset:
    url: ${FRONTEND_PASSWORD_RESET_URL:http://localhost:3000/reset-password}
    expire-minutes: 30

cloud:
  aws:
    region: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket: retrip-media

# PortOne V2 설정 (환경 변수로 관리)
portone:
  public:
    store-id: ${PORTONE_STORE_ID}
    channel-key: ${PORTONE_CHANNEL_KEY}
  api_secret: ${PORTONE_API_SECRET}
