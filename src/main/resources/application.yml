spring:
  application:
    name: auth
  #dataSource
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;MODE=MySQL
    username: sa
  #JPA
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update # 스키마 변경을 위해 update로 임시 변경 (운영 환경에서는 validate 또는 none 권장)
    open-in-view: false

  # [수정] OAuth2 설정 (네이버 추가)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: your-google-client-id
            client-secret: your-google-client-secret
            scope:
              - profile
              - email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
          kakao:
            client-id: your-kakao-rest-api-key
            client-secret: your-kakao-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            client-name: Kakao

          # [4주차 신규 추가] 네이버 설정
          naver:
            client-id: your-naver-client-id
            client-secret: your-naver-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            redirect-uri: "http://localhost:8080/login/oauth2/code/naver"
            client-name: Naver

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          # [4주차 신규 추가] 네이버 설정
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response # 네이버는 response 객체 안에 id, email 등이 있음

#logging
logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql: trace
      springframework:
        web:
          client:
            RestTemplate: DEBUG
token:
  jwt:
    secret: Kf9uX!7zQa2$rB3cP#dLmV8@eYtNwZxGjHsTrC1o
    header: Authorization
    prefix: Bearer
    access:
      expire-min: 120
    refresh:
      expire-min: 1051200 #2년

springdoc:
  swagger-ui:
    use-root-path: true