token:
  jwt:
    private-key: 
    public-key: 
    header: Authorization
    prefix: Bearer
    access:
      expire-min: 30
    refresh:
      expire-min: 20160

portone:
  public:
    store-id: test-store-id
    channel-key: test-channel-key
  api_secret: test-api-secret

cloud:
  aws:
    region: ap-northeast-2
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
  s3:
    bucket: retrip-media

app:
  frontend-callback-url: http://localhost:3000/auth/callback
  mail:
    from: noreply@test.com
  password-reset:
    url: http://localhost:3000/reset-password
    expire-minutes: 30

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - profile
              - email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            client-name: Kakao
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            redirect-uri: "http://localhost:8080/login/oauth2/code/naver"
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
