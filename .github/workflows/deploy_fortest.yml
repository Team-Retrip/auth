name: Build & Deploy (auth - deploy-test)

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Build (skip tests)
        run: ./gradlew clean build -x test

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push
        run: |
          REPO=${{ secrets.DOCKER_USERNAME }}/retrip-auth
          docker build -t $REPO:deploy-test -t $REPO:deploy-test-${{ github.sha }} .
          docker push $REPO:deploy-test
          docker push $REPO:deploy-test-${{ github.sha }}

  open-ssh:
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      runner_ip: ${{ steps.ip.outputs.ipv4 }}
    steps:
      - id: ip
        uses: candidob/get-runner-ip@2e5406f1492227920ba96df909e648be5e8b8cb2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Allow SSH temporarily (22/tcp)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 22 \
            --cidr "${{ steps.ip.outputs.ipv4 }}/32" \
          || echo "Ingress rule may already exist; continuing."

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, open-ssh]
    steps:
      - name: Deploy auth via compose (partial update)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            cd ~/all-in-one
            test -f docker-compose.yml || (echo "compose file not found"; ls -la; exit 1)
            docker compose pull auth
            docker compose up -d auth
            docker compose ps

  close-ssh:
    if: always()
    runs-on: ubuntu-latest
    needs: open-ssh
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Revoke SSH
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 22 \
            --cidr "${{ needs.open-ssh.outputs.runner_ip }}/32" \
          || echo "Ingress rule not found; continuing."
