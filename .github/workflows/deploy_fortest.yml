name: Build & Deploy (auth - deploy-test)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (skip tests)
        run: ./gradlew clean build -x test

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push
        run: |
          REPO=${{ secrets.DOCKER_USERNAME }}/retrip-auth
          docker build -t $REPO:latest -t $REPO:latest-${{ github.sha }} .
          docker push $REPO:latest
          docker push $REPO:latest-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Get egress IPv4
        id: egress
        run: |
          IP=$(curl -s https://checkip.amazonaws.com | tr -d '\r\n')
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Allow SSH and capture rule-id
        id: add
        run: |
          CIDR="${{ steps.egress.outputs.ip }}/32"
          OUT=$(aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 22 --cidr "$CIDR" \
            --output json 2>&1) || true
          RID=$(echo "$OUT" | jq -r '.SecurityGroupRules[0].SecurityGroupRuleId // empty')
          echo "rule_id=$RID" >> "$GITHUB_OUTPUT"

      - name: Wait for SG propagation
        run: sleep 8

      - name: Deploy auth
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -e

            IMAGE=${{ secrets.DOCKER_USERNAME }}/retrip-auth:latest
            CONTAINER=auth

            docker pull $IMAGE

            if docker ps -a --format '{{.Names}}' | grep -q "^$CONTAINER$"; then
              docker stop $CONTAINER
              docker rm $CONTAINER
            fi

            docker run -d \
              --name auth \
              -p 8081:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL=jdbc:mysql://172.31.46.83:3306/auth_db?useSSL=false&serverTimezone=Asia/Seoul \
              -e DB_USERNAME=retrip \
              -e DB_PASSWORD=retrippw \
              -e SERVER_PORT=8080 \
              --restart always \
              $IMAGE


            docker ps

      - name: Revoke SSH
        if: always()
        run: |
          RID="${{ steps.add.outputs.rule_id }}"
          CIDR="${{ steps.egress.outputs.ip }}/32"
          if [ -n "$RID" ]; then
            aws ec2 revoke-security-group-ingress --security-group-rule-ids "$RID" || true
          else
            aws ec2 revoke-security-group-ingress \
              --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
              --protocol tcp --port 22 --cidr "$CIDR" || true
          fi
