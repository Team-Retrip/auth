name: Build & Deploy (auth - deploy-test)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (skip tests)
        run: ./gradlew clean build -x test

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push
        run: |
          REPO=${{ secrets.DOCKER_USERNAME }}/retrip-auth
          docker build -t $REPO:deploy-test -t $REPO:deploy-test-${{ github.sha }} .
          docker push $REPO:deploy-test
          docker push $REPO:deploy-test-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          # 임시자격(STS) 사용 시:
          # aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Get egress IPv4 (this job)
        id: egress
        run: |
          IP=$(curl -s https://checkip.amazonaws.com | tr -d '\r\n')
          if [ -z "$IP" ]; then echo "Failed to get egress IP"; exit 1; fi
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "EGRESS IPv4: $IP"

      - name: Allow SSH and capture rule-id
        id: add
        run: |
          CIDR="${{ steps.egress.outputs.ip }}/32"
          echo "Authorizing $CIDR on SG ${{ secrets.AWS_SECURITY_GROUP_ID }}"
          OUT=$(aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 22 --cidr "$CIDR" \
            --output json 2>&1) || true
          echo "$OUT"
          RID=$(echo "$OUT" | jq -r '.SecurityGroupRules[0].SecurityGroupRuleId // empty')
          echo "rule_id=$RID" >> "$GITHUB_OUTPUT"

      - name: Wait for SG propagation
        run: sleep 8

      - name: Probe 22/tcp
        run: |
          timeout 5 bash -c "echo > /dev/tcp/${{ secrets.EC2_HOST }}/22" \
            && echo "22 open" || (echo "22 closed"; exit 1)

      - name: Deploy auth via compose (partial update)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -e
            cd ~/all-in-one
            test -f docker-compose.yml || (echo "compose file not found"; ls -la; exit 1)
            docker compose pull auth
            docker compose up -d auth
            docker compose ps

      - name: Revoke SSH (by rule-id or CIDR)
        if: always()
        run: |
          RID="${{ steps.add.outputs.rule_id }}"
          CIDR="${{ steps.egress.outputs.ip }}/32"
          if [ -n "$RID" ]; then
            aws ec2 revoke-security-group-ingress --security-group-rule-ids "$RID" || true
          else
            aws ec2 revoke-security-group-ingress \
              --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
              --protocol tcp --port 22 --cidr "$CIDR" || true
          fi
