name: Build & Deploy (auth - deploy-test)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (skip tests)
        run: ./gradlew clean build -x test

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push
        run: |
          REPO=${{ secrets.DOCKER_USERNAME }}/retrip-auth
          docker build -t $REPO:latest -t $REPO:latest-${{ github.sha }} .
          docker push $REPO:latest
          docker push $REPO:latest-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Get egress IPv4
        id: egress
        run: |
          IP=$(curl -s https://checkip.amazonaws.com | tr -d '\r\n')
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Allow SSH
        id: add
        run: |
          CIDR="${{ steps.egress.outputs.ip }}/32"
          echo "Authorizing SSH from $CIDR"
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 22 --cidr "$CIDR" || true


      - name: Wait for SG propagation
        run: sleep 8

      - name: Deploy auth
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -e

            IMAGE=${{ secrets.DOCKER_USERNAME }}/retrip-auth:latest
            CONTAINER=auth

            docker pull $IMAGE

            if docker ps -a --format '{{.Names}}' | grep -q "^$CONTAINER$"; then
              docker stop $CONTAINER
              docker rm $CONTAINER
            fi

            docker network create retrip-net || true
          
            docker run -d \
              --name "$CONTAINER" \
              --network retrip-net \
              -p 8081:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SERVER_PORT=8080 \
              -e APP_BASE_URL="${{ secrets.APP_BASE_URL }}" \
              -e FRONTEND_CALLBACK_URL="${{ secrets.FRONTEND_CALLBACK_URL }}" \
              -e DB_URL="jdbc:mysql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.AUTH_DB_NAME }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_PRIVATE_KEY="${{ secrets.JWT_PRIVATE_KEY }}" \
              -e JWT_PUBLIC_KEY="${{ secrets.JWT_PUBLIC_KEY }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
              -e KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
              -e NAVER_CLIENT_ID="${{ secrets.NAVER_CLIENT_ID }}" \
              -e NAVER_CLIENT_SECRET="${{ secrets.NAVER_CLIENT_SECRET }}" \
              -e PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              -e PORTONE_CHANNEL_KEY="${{ secrets.PORTONE_CHANNEL_KEY }}" \
              -e PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              -e FRONTEND_PASSWORD_RESET_URL="${{ secrets.FRONTEND_PASSWORD_RESET_URL }}" \
              --restart always \
              "$IMAGE"


            docker ps

      - name: Revoke SSH
        if: always()
        run: |
          CIDR="${{ steps.egress.outputs.ip }}/32"
          echo "Revoking SSH from $CIDR"
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 22 --cidr "$CIDR" || true
