name: Build and Deploy Auth App on Develop Update

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-merge-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: DockerHub 로그인
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Docker 이미지 빌드
      run: |
        docker build -t bjisu/auth-server:latest .

    - name: DockerHub에 이미지 푸시
      run: |
        docker push bjisu/auth-server:latest

    - name: EC2에 접속하여 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker pull bjisu/auth-app:latest
          docker stop auth-app || true
          docker rm auth-app || true
          docker run -d --name auth-app -p 8080:8080 bjisu/auth-app:latest
